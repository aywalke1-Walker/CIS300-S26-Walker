<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skincare Quiz</title>
    <link rel="stylesheet" href="skin.css">
</head>
<body>
    <header>
        <h1>DermaCare</h1>
    </header>
    <nav>
            <a href="index.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="products.html">Products</a>
            <a href="concerns.html">Concerns</a>

            <a href="faq.html">FAQ</a>
    </nav>
     <main>
        <h2>Skincare Quiz</h2>
        <p>Answer a few questions to get your personalized routine.</p>

        <div class="quiz-container">
            <form>
                <label>1. What is your skin type?</label>
                <select>
                    <option>Oily</option>
                    <option>Dry</option>
                    <option>Combination</option>
                    <option>Sensitive</option>
                </select>

                <label>2. What is your main concern?</label>
                <select>
                    <option>Acne</option>
                    <option>Dark Spots</option>
                    <option>Dryness</option>
                    <option>Aging</option>
                </select>

                <label>3. How sensitive is your skin?</label>
                <select>
                    <option>Not sensitive</option>
                    <option>Somewhat sensitive</option>
                    <option>Very sensitive</option>
                </select>

                <label>4. How complex do you want your routine?</label>
                <select>
                    <option>Simple</option>
                    <option>Moderate</option>
                    <option>Full Routine</option>
                </select>

                <button type="submit">Get My Routine</button>
            </form>
            <div id="result"></div>
        </div>
    </main>
</body>
</html>
