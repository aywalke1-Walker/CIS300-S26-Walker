     <main>
        <h2>Skincare Quiz</h2>
        <p>This quiz is designed to help you understand your skin and build a routine
        that fits your needs. Your answers will guide you toward the best products
        and ingredients.</p>
        <div class="quiz-container">
            <form action="#">
                <label for="skin">1. What is your skin type?</label>
                <select id="skin" name="skin_type">
                    <option>Oily</option>
                    <option>Dry</option>
                    <option>Combination</option>
                    <option>Sensitive</option>
                </select>

                <label for="concern">2. What is your main concern?</label>
                <select id="concern" name="concern">
                    <option>Acne</option>
                    <option>Dark Spots</option>
                    <option>Dryness</option>
                    <option>Aging</option>
                </select>

                <label for="sensitivity">3. How sensitive is your skin?</label>
                <select id="sensitivity" name="sensitivity">
                    <option>Not sensitive</option>
                    <option>Somewhat sensitive</option>
                    <option>Very sensitive</option>
                </select>

                <label for="routine">4. How complex do you want your routine?</label>
                <select id="routine" name="routine_level">
                    <option>Simple</option>
                    <option>Moderate</option>
                    <option>Full Routine</option>
                </select>
                <button type="submit">Get My Routine</button>
            </form>
        </div>
    </main>
